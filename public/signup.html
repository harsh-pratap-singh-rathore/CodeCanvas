<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — CodeCanvas v2</title>
    <link rel="icon" type="image/png" href="./assets/images/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css?v=2.0">
    <link rel="stylesheet" href="./assets/css/responsive.css?v=2.0">

    <style>
        /* Premium V2 Landing Page Overrides */
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Glass Header */
        .header {
            background: rgba(255, 255, 255, 0.8) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05) !important;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo-v2 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .badge-v2 {
            font-size: 10px;
            font-weight: 800;
            background: transparent;
            color: #0a0a0a;
            border: 1.5px solid #0a0a0a;
            padding: 2px 8px;
            border-radius: 99px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
        }

        /* Canvas Background */
        .auth-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.5;
            z-index: -1;
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        /* V2 Auth Container */
        .auth-wrapper {
            flex-grow: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        .auth-box-v2 {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 48px;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.08);
            text-align: center;
            position: relative;
            animation: fadeUp 0.8s ease-out;
            z-index: 10;
        }

        .auth-box-v2 h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0a0a0a;
            margin-bottom: 8px;
        }

        .auth-subtitle-v2 {
            font-size: 15px;
            color: #6b6b6b;
            margin-bottom: 32px;
        }

        /* Premium Social Button */
        .btn-google-v2 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            color: #0a0a0a;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            margin-bottom: 24px;
        }

        .btn-google-v2:hover {
            border-color: #0a0a0a;
            background: #f9f9f9;
            transform: translateY(-1px);
        }

        /* Separator */
        .auth-separator {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .auth-separator div {
            flex: 1;
            height: 1px;
            background: #e5e5e5;
        }

        .auth-separator span {
            font-size: 12px;
            font-weight: 600;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Form Inputs */
        .form-group-v2 {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group-v2 label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #0a0a0a;
            margin-bottom: 8px;
        }

        .form-group-v2 input {
            width: 100%;
            padding: 14px 16px;
            background: #f9f9f9;
            border: 1px solid transparent;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #0a0a0a;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .form-group-v2 input:focus {
            outline: none;
            background: #ffffff;
            border-color: #0a0a0a;
        }

        .btn-submit-v2 {
            width: 100%;
            padding: 16px;
            background: #0a0a0a;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit-v2:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .btn-submit-v2:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Links */
        .auth-link-v2 {
            margin-top: 24px;
            font-size: 14px;
            color: #6b6b6b;
        }

        .auth-link-v2 a {
            color: #0a0a0a;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .auth-link-v2 a:hover {
            border-color: #0a0a0a;
        }

        /* Messages */
        .auth-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        .auth-message.error { background: #fee2e2; color: #991b1b; }
        .auth-message.success { background: #dcfce7; color: #166534; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .auth-box-v2 { padding: 32px 24px; border: none; box-shadow: none; border-radius: 0; }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo-v2">
                    CodeCanvas
                    <span class="badge-v2">v2</span>
                </a>
                <div class="header-actions">
                    <a href="login.html" class="btn" style="background: transparent; color: #0a0a0a; border: 1px solid #e5e5e5; border-radius: 99px; padding: 8px 16px; font-weight: 600;">Log In</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Auth Area -->
    <main class="auth-wrapper">
        <div class="auth-pattern"></div>
        <div class="auth-box-v2">
            <h1>Start Building</h1>
            <p class="auth-subtitle-v2">Create your account to unlock the intelligence.</p>

            <a href="../app/auth/google-login.php" class="btn-google-v2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                </svg>
                Continue with Google
            </a>

            <div class="auth-separator">
                <div></div>
                <span>or email signup</span>
                <div></div>
            </div>

            <form id="signupForm">
                <div class="auth-message" id="message"></div>

                <div class="form-group-v2">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Jane Doe">
                </div>

                <div class="form-group-v2">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@company.com">
                </div>

                <div class="form-group-v2">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="6" placeholder="••••••••">
                </div>

                <button type="submit" id="submitBtn" class="btn-submit-v2">
                    Create Account
                </button>
            </form>

            <div class="auth-link-v2">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </main>

    <footer class="footer" style="background: #ffffff; padding: 32px 0;">
        <div class="container" style="text-align: center; color: #a0a0a0; font-size: 13px;">
            &copy; 2026 CodeCanvas. All rights reserved.
        </div>
    </footer>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            const formData = new FormData(e.target);

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('../app/auth/signup.php', { method: 'POST', body: formData });
                const data = await response.json();
                
                messageDiv.textContent = data.message;
                messageDiv.className = 'auth-message ' + (data.success ? 'success' : 'error');
                messageDiv.style.display = 'block';

                if (data.success) {
                    setTimeout(() => { window.location.href = data.redirect; }, 1500);
                } else {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (error) {
                messageDiv.textContent = 'Connection Error: ' + error.message;
                messageDiv.className = 'auth-message error';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
