<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — CodeCanvas</title>
    <link href="./assets/css/admin-theme.css" rel="stylesheet">
    <style>
        body {
            background-color: var(--gray-50);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .auth-header { text-align: center; margin-bottom: 28px; }

        .auth-icon {
            width: 48px; height: 48px;
            background: #F5F5F5;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 22px;
        }

        .auth-title {
            font-size: 22px; font-weight: 700;
            color: var(--black); margin-bottom: 6px; letter-spacing: -0.4px;
        }

        .auth-subtitle {
            font-size: 13px; color: var(--gray-600); line-height: 1.5;
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block; font-size: 13px;
            font-weight: 500; margin-bottom: 6px; color: var(--black);
        }

        .form-input {
            width: 100%; padding: 10px 12px;
            border: 1px solid var(--gray-200); border-radius: 6px;
            font-size: 14px; font-family: inherit;
            transition: all 0.2s ease; box-sizing: border-box;
        }

        .form-input:focus {
            outline: none; border-color: var(--black);
            box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
        }

        .btn-full {
            width: 100%; padding: 11px;
            border: none; border-radius: 6px;
            background: var(--black); color: var(--white);
            font-size: 14px; font-weight: 600;
            cursor: pointer; transition: opacity .2s;
        }

        .btn-full:hover   { opacity: 0.85; }
        .btn-full:disabled { opacity: 0.5; cursor: not-allowed; }

        .auth-footer {
            margin-top: 24px; text-align: center;
            font-size: 13px; color: var(--gray-600);
        }

        .auth-footer a {
            color: var(--black); text-decoration: none; font-weight: 500;
        }

        .auth-footer a:hover { text-decoration: underline; }

        .alert {
            padding: 10px 12px; border-radius: 6px;
            font-size: 13px; margin-bottom: 16px; display: none;
            text-align: center; line-height: 1.4;
        }

        .alert-error   { background:#FEF2F2; color:#991B1B; border:1px solid #FECACA; }
        .alert-success { background:#F0FDF4; color:#166534; border:1px solid #BBF7D0; }

        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>

    <div class="auth-card">

        <!-- Step 1: Enter Email -->
        <div id="step-email" class="step active">
            <div class="auth-header">
                <div class="auth-icon">🔑</div>
                <h1 class="auth-title">Forgot Password?</h1>
                <p class="auth-subtitle">
                    Enter your registered email and we'll send you a verification code.
                </p>
            </div>

            <div class="alert alert-error"   id="email-error"></div>
            <div class="alert alert-success" id="email-success"></div>

            <form id="emailForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input"
                           placeholder="name@example.com" required autofocus>
                </div>
                <button type="submit" id="emailBtn" class="btn-full">Send Reset Code</button>
            </form>

            <div class="auth-footer">
                Remembered it? <a href="login.html">Back to Login</a>
            </div>
        </div>

        <!-- Step 2: Success nudge (auto-redirect) -->
        <div id="step-sent" class="step">
            <div class="auth-header">
                <div class="auth-icon">📧</div>
                <h1 class="auth-title">Check Your Email</h1>
                <p class="auth-subtitle">
                    We've sent a 6-digit verification code to <strong id="sent-to"></strong>.
                    Redirecting you to enter it…
                </p>
            </div>
            <div style="text-align:center;margin-top:20px;">
                <div style="width:32px;height:32px;border:3px solid #e5e5e5;border-top-color:#000;
                            border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;"></div>
            </div>
        </div>

    </div>

    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

    <script>
    const emailForm = document.getElementById('emailForm');
    const emailBtn  = document.getElementById('emailBtn');
    const emailErr  = document.getElementById('email-error');
    const emailOk   = document.getElementById('email-success');

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showAlert(el, msg) {
        el.textContent = msg;
        el.style.display = 'block';
    }

    function hideAlerts() {
        emailErr.style.display = 'none';
        emailOk.style.display  = 'none';
    }

    emailForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideAlerts();

        const email = document.getElementById('email').value.trim();
        emailBtn.disabled    = true;
        emailBtn.textContent = 'Sending…';

        try {
            const fd = new FormData();
            fd.append('email', email);

            const res  = await fetch('../app/auth/forgot-password.php', { method: 'POST', body: fd });
            const data = await res.json();

            if (data.success) {
                document.getElementById('sent-to').textContent = email;
                showStep('step-sent');
                // Redirect after short delay so user can read the message
                setTimeout(() => {
                    window.location.href = 'verify-reset.html?email=' + encodeURIComponent(email);
                }, 2200);
            } else {
                showAlert(emailErr, data.message || 'Something went wrong. Please try again.');
                emailBtn.disabled    = false;
                emailBtn.textContent = 'Send Reset Code';
            }
        } catch (err) {
            showAlert(emailErr, 'Network error — please check your connection.');
            emailBtn.disabled    = false;
            emailBtn.textContent = 'Send Reset Code';
        }
    });
    </script>

</body>
</html>
