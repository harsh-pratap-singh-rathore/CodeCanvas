<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Template - CodeCanvas Editor</title>
    <link href="assets/css/template-engine.css" rel="stylesheet">
</head>

<body class="template-engine-body">

    <!-- Header -->
    <header class="te-header">
        <a href="dashboard.html" class="te-logo">CodeCanvas</a>
        <nav class="te-nav">
            <a href="dashboard.html">Back to Dashboard</a>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="te-container">

        <div style="text-align: center; max-width: 600px; margin: 0 auto;">
            <h1 style="font-size: 32px; margin-bottom: 16px;">Create New Portfolio</h1>
            <p style="color: var(--text-muted); margin-bottom: 40px;">
                Upload a customized HTML template to start or use our default starter.
            </p>

            <!-- Upload Area -->
            <div id="drop-zone" class="upload-zone">
                <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                    </path>
                </svg>
                <div class="upload-text">Drag & drop template file here</div>
                <div class="upload-subtext">or click to browse (.html)</div>
                <input type="file" id="file-input" accept=".html" style="display: none;">
            </div>

            <!-- Error Message -->
            <div id="error-msg" style="color: #ff4d4f; margin-top: 16px; display: none;"></div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="assets/js/template-parser.js"></script>
    <script src="assets/js/template-renderer.js"></script>
    <script src="assets/js/template-engine.js"></script>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const errorMsg = document.getElementById('error-msg');
        const engine = window.templateEngine; // Access global instance

        // 1. Click to upload
        dropZone.addEventListener('click', () => fileInput.click());

        // 2. Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');

            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // 3. File Input Change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });


        /**
         * Reads file content and sends to engine
         */
        function handleFile(file) {
            errorMsg.style.display = 'none';

            // Validate Type
            if (file.type !== 'text/html' && !file.name.endsWith('.html')) {
                errorMsg.textContent = 'Please upload a valid .html file.';
                errorMsg.style.display = 'block';
                return;
            }

            // Read Content
            const reader = new FileReader();

            reader.onload = (e) => {
                const content = e.target.result;
                // Parse Placeholders
                const parser = new TemplateParser();
                const fields = parser.parse(content);

                if (fields.length === 0) {
                    errorMsg.textContent = 'No placeholders detected (e.g. {{name}}). Please make sure your HTML contains editable fields.';
                    errorMsg.style.display = 'block';
                    return;
                }

                // Proceed with engine
                engine.handleUpload(content);
                // Engine handles redirect to editor
            };

            reader.onerror = () => {
                errorMsg.textContent = 'Error reading file.';
                errorMsg.style.display = 'block';
            };

            reader.readAsText(file);
        }
    </script>

</body>

</html>
