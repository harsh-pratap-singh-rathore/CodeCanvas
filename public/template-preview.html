<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Template - CodeCanvas Preview</title>
    <link href="assets/css/template-engine.css" rel="stylesheet">
</head>

<body class="template-engine-body">

    <!-- Header -->
    <header class="te-header">
        <a href="dashboard.html" class="te-logo">CodeCanvas</a>
        <nav class="te-nav">
            <a href="template-editor.html">Edit</a>
            <!-- Back Action -->
            <a href="dashboard.html" class="btn btn-outline" style="margin-right: 12px;">Save & Exit</a>
            <!-- Export Action -->
            <button class="btn btn-primary" onclick="exportHtml()">Download HTML</button>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="te-container" style="padding-top: 20px;">

        <div class="preview-layout"
            style="height: calc(100vh - 120px); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; background: white;">

            <!-- Full Live Preview -->
            <iframe id="preview-frame" style="width: 100%; height: 100%; border: none;" title="Full Preview"></iframe>

        </div>

        <p style="text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 13px;">This is how your
            live website will look.</p>

    </div>

    <!-- Scripts -->
    <script src="assets/js/template-parser.js"></script>
    <script src="assets/js/template-renderer.js"></script>
    <script src="assets/js/template-engine.js"></script>

    <script>
        const engine = window.templateEngine;
        const frame = document.getElementById('preview-frame');

        // Check if data exists
        if (!engine.currentHtml) {
            alert('No template loaded. Redirecting to upload.');
            window.location.href = 'templates-upload.html';
        }

        // Initialize Preview
        updatePreview();

        /**
         * Updates the iframe srcdoc
         */
        function updatePreview() {
            const finalHtml = engine.getRenderedHtml();
            frame.srcdoc = finalHtml;
        }

        /**
         * Trigger Download
         */
        function exportHtml() {
            engine.exportPortfolio();
        }

    </script>
</body>

</html>
