<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Settings — CodeCanvas</title>
    <link rel="stylesheet" href="<?= BASE_URL ?>/public/assets/css/style.css">
    <link rel="stylesheet" href="<?= BASE_URL ?>/public/assets/css/responsive.css">
    <style>
        /* View Settings Panel */
        .settings-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        .settings-header {
            margin-bottom: 48px;
        }

        .settings-header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: #0F0F0F;
        }

        .settings-header p {
            font-size: 15px;
            color: #6B6B6B;
        }

        .settings-group {
            margin-bottom: 40px;
            padding-bottom: 32px;
            border-bottom: 1px solid #E5E5E5;
        }

        .settings-group:last-child {
            border-bottom: none;
        }

        .settings-group h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #0F0F0F;
            margin-bottom: 16px;
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 8px 16px;
            border: 2px solid #E5E5E5;
            background: #FFFFFF;
            color: #0F0F0F;
            font-size: 14px;
            font-weight: 500;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            border-color: #000;
            background: #FAFAFA;
        }

        .option-btn.active {
            background: #000;
            color: #FFF;
            border-color: #000;
        }

        .toggle-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
        }

        .toggle-label {
            font-size: 15px;
            color: #0F0F0F;
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 28px;
            background: #E5E5E5;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .toggle-switch.active {
            background: #000;
        }

        .toggle-knob {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 20px;
            height: 20px;
            background: #FFF;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .toggle-switch.active .toggle-knob {
            transform: translateX(20px);
        }

        .section-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-btn {
            padding: 10px 16px;
            border: 1px solid #E5E5E5;
            background: #FAFAFA;
            color: #0F0F0F;
            font-size: 14px;
            font-weight: 500;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .section-btn:hover {
            border-color: #000;
            background: #FFF;
        }

        .back-link {
            display: inline-block;
            margin-top: 48px;
            color: #6B6B6B;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #000;
        }
    </style>
</head>

<body>
    <div class="settings-container">
        <!-- Header -->
        <div class="settings-header">
            <h1>View Settings</h1>
            <p>Control how you view your website preview</p>
        </div>

        <!-- Device Preview -->
        <div class="settings-group">
            <h3>Device Preview</h3>
            <div class="button-group" id="device-group">
                <button class="option-btn active" data-device="desktop">Desktop</button>
                <button class="option-btn" data-device="tablet">Tablet</button>
                <button class="option-btn" data-device="mobile">Mobile</button>
            </div>
        </div>

        <!-- Zoom Level -->
        <div class="settings-group">
            <h3>Zoom Level</h3>
            <div class="button-group" id="zoom-group">
                <button class="option-btn" data-zoom="75">75%</button>
                <button class="option-btn active" data-zoom="100">100%</button>
                <button class="option-btn" data-zoom="125">125%</button>
            </div>
        </div>

        <!-- Section Navigation -->
        <div class="settings-group">
            <h3>Jump to Section</h3>
            <ul class="section-list">
                <li><button class="section-btn" data-section="hero">Hero Section</button></li>
                <li><button class="section-btn" data-section="about">About Section</button></li>
                <li><button class="section-btn" data-section="skills">Skills Section</button></li>
                <li><button class="section-btn" data-section="contact">Contact Section</button></li>
            </ul>
        </div>

        <!-- Full Width Toggle -->
        <div class="settings-group">
            <h3>Display Options</h3>
            <div class="toggle-control">
                <span class="toggle-label">Full-width preview</span>
                <div class="toggle-switch" id="fullwidth-toggle">
                    <div class="toggle-knob"></div>
                </div>
            </div>
        </div>

        <!-- Back to Project -->
        <a href="project-view.html" class="back-link">← Back to Project</a>
    </div>

    <script>
        (function () {
            'use strict';

            // Get saved settings or defaults
            const settings = {
                device: localStorage.getItem('viewDevice') || 'desktop',
                zoom: localStorage.getItem('viewZoom') || '100',
                fullwidth: localStorage.getItem('viewFullwidth') === 'true'
            };

            // Device selection
            const deviceButtons = document.querySelectorAll('#device-group .option-btn');
            deviceButtons.forEach(btn => {
                if (btn.dataset.device === settings.device) {
                    btn.classList.add('active');
                }

                btn.addEventListener('click', () => {
                    deviceButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    settings.device = btn.dataset.device;
                    localStorage.setItem('viewDevice', settings.device);
                    console.log('Device:', settings.device);
                });
            });

            // Zoom selection
            const zoomButtons = document.querySelectorAll('#zoom-group .option-btn');
            zoomButtons.forEach(btn => {
                if (btn.dataset.zoom === settings.zoom) {
                    btn.classList.add('active');
                }

                btn.addEventListener('click', () => {
                    zoomButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    settings.zoom = btn.dataset.zoom;
                    localStorage.setItem('viewZoom', settings.zoom);
                    console.log('Zoom:', settings.zoom + '%');
                });
            });

            // Section navigation (logs for now, would postMessage to iframe)
            const sectionButtons = document.querySelectorAll('.section-btn');
            sectionButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const section = btn.dataset.section;
                    console.log('Jump to section:', section);
                    // In production: postMessage to iframe to scroll
                });
            });

            // Full-width toggle
            const fullwidthToggle = document.getElementById('fullwidth-toggle');
            if (settings.fullwidth) {
                fullwidthToggle.classList.add('active');
            }

            fullwidthToggle.addEventListener('click', () => {
                fullwidthToggle.classList.toggle('active');
                settings.fullwidth = fullwidthToggle.classList.contains('active');
                localStorage.setItem('viewFullwidth', settings.fullwidth);
                console.log('Full-width:', settings.fullwidth);
            });
        })();
    </script>
<script src="<?= BASE_URL ?>/public/assets/js/mobile-nav.js"></script>
</body>

</html>
